.ad-slot {

.card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 2px solid transparent; transition: 0.3s; margin-bottom: 20px; }
.card.active { border-color: #3498db; transform: translateY(-5px); }
.card.completed { border-color: #27ae60; opacity: 0.7; }
.card.locked { filter: grayscale(1); opacity: 0.5; pointer-events: none; }
.card-content { padding: 15px; text-align: center; }
.btn { background: #3498db; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }

.math-box input { width: 60px; padding: 8px; text-align: center; border: 1px solid #ddd; border-radius: 4px; }

<script>
const TASK_LINKS = [

"https://bit.ly/3OlTrtE_5", "https://bit.ly/3OTWRDU_6", "https://bit.ly/4b3AnsP_7", "https://bit.ly/3OCTlxG_8",
"https://bit.ly/4kXuwZC_9", "https://bit.ly/4kOcTeH_10", "https://bit.ly/3ZMFiYX_11", "https://bit.ly/4c7jb6T_12",
"https://bit.ly/4qOCchQ_13", "https://bit.ly/4s1Gdk5_14", "https://bit.ly/46hu3LM_15", "https://bit.ly/46hohJZ_16",
"https://bit.ly/4awuWCE_17", "https://bit.ly/4ruU9Dk_18", "https://bit.ly/4kOdayf_19", "https://bit.ly/4aMfIs8_20"
];

let currentTaskIndex = parseInt(localStorage.getItem('user_task_step')) || 0;
let isTabActive = true;
let currentAnswer = 0;

document.addEventListener("visibilitychange", () => { isTabActive = !document.hidden; });

function playBeep() {
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const oscillator = audioCtx.createOscillator();
const gainNode = audioCtx.createGain();
oscillator.connect(gainNode);
gainNode.connect(audioCtx.destination);
oscillator.type = 'sine';
oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
oscillator.start();
oscillator.stop(audioCtx.currentTime + 0.5);
}

// আপনার দেওয়া ৫টি নতুন অ্যাড কোড এখানে রিপ্লেস করা হয়েছে
function getBannerAds() {
return `
<div class="ad-slot">
<script type="text/javascript"> atOptions = { 'key' : 'eeaa64847c68028bcba08e3d8b2a1ddf', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} }; </scr`+`ipt>
<script src="https://balkliving.com/eeaa64847c68028bcba08e3d8b2a1ddf/invoke.js"></scr`+`ipt>

<div class="ad-slot">

<script type="text/javascript"> atOptions = { 'key' : 'c2564a2eeb5b5355016efaa27e8d63d8', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} }; </scr`+`ipt>
<script src="https://balkliving.com/c2564a2eeb5b5355016efaa27e8d63d8/invoke.js"></scr`+`ipt>
</div>
<div class="ad-slot">
<script type="text/javascript"> atOptions = { 'key' : '734920ac121dfa73df59827e630d0846', 'format' : 'iframe', 'height' : 300, 'width' : 160, 'params' : {} }; </scr`+`ipt>
<script src="https://balkliving.com/734920ac121dfa73df59827e630d0846/invoke.js"></scr`+`ipt>

<div class="ad-slot">
<script type="text/javascript"> atOptions = { 'key' : '8d8437eb8e7c97a70d4f2efd5f13f0c0', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} }; </scr`+`ipt>
<script src="https://balkliving.com/8d8437eb8e7c97a70d4f2efd5f13f0c0/invoke.js"></scr`+`ipt>
</div>`;
}

function getNativeAd() {
return `
<div class="ad-slot native-ad-box">
<p style="font-size:10px; color:#999; margin:0">SPONSORED CONTENT</p>
<script async="async" data-cfasync="false" src="https://balkliving.com/8240b097667a82ab7389e91cc1d33a22/invoke.js"></scr`+`ipt>
<div id="container-8240b097667a82ab7389e91cc1d33a22"></div>
</div>`;
}

function buildUI() {
const container = document.getElementById('task-container');
container.innerHTML = '';
TASK_LINKS.forEach((link, i) => {
const isDone = i < currentTaskIndex;
const card = document.createElement('div');
card.className = `card ${isDone ? 'completed' : (i === currentTaskIndex ? 'active' : 'locked')}`;
card.innerHTML = `
<img src="https://picsum.photos/400/200?random=${i}" style="width:100%">
<div class="card-content">
<div style="font-weight:600;margin-bottom:10px">Task #${i+1}</div>
<button class="btn" id="btn-${i}" ${i !== currentTaskIndex || isDone ? 'disabled' : ''} onclick="handleTask(${i})">
${isDone ? '✅ Done' : 'Start Task'}
</button>
<div id="warn-${i}" class="warning">⚠️ Stay on the ad page for a few seconds!</div>
<div id="math-${i}" class="math-box">
<span id="exp-${i}"></span> = <input type="number" id="ans-${i}">
<button onclick="verifyMath(${i})">Verify</button>
</div>
</div>`;
container.appendChild(card);
if ((i + 1) % 2 === 0) {
const adWrapper = document.createElement('div');
adWrapper.innerHTML = getBannerAds() + getNativeAd();
container.appendChild(adWrapper);
}
});
if (currentTaskIndex >= TASK_LINKS.length) showFinal();
}

function handleTask(index) {
const btn = document.getElementById(`btn-${index}`);
const warn = document.getElementById(`warn-${index}`);
window.open(TASK_LINKS[index], '_blank', 'noopener,noreferrer');
let timeNeeded = Math.floor(Math.random() * (25 - 19 + 1)) + 19;
let passed = 0;
btn.disabled = true;
const timer = setInterval(() => {
if (!isTabActive) {
passed++;
btn.innerText = `Analyzing... ${timeNeeded - passed}s`;
warn.style.display = 'none';
} else {
warn.style.display = 'block';
btn.innerText = "Paused! Go back to Ad";
}
if (passed >= timeNeeded) {
clearInterval(timer);
playBeep();
btn.style.display = 'none';
warn.style.display = 'none';
setTimeout(() => showMath(index), 1000);
}
}, 1000);
}

function showMath(index) {
const mathBox = document.getElementById(`math-${index}`);
const n1 = Math.floor(Math.random() * 15) + 1;
const n2 = Math.floor(Math.random() * 10) + 1;
currentAnswer = n1 + n2;
document.getElementById(`exp-${index}`).innerText = `${n1} + ${n2}`;
mathBox.style.display = 'block';
}

function verifyMath(index) {
if (parseInt(document.getElementById(`ans-${index}`).value) === currentAnswer) {
currentTaskIndex++;
localStorage.setItem('user_task_step', currentTaskIndex);
buildUI();
window.scrollTo(0, 0);
} else {
alert("Wrong! Try again.");
}
}

function showFinal() {
document.getElementById('final-section').style.display = 'block';
document.getElementById('task-container').style.display = 'none';
let code = localStorage.getItem('final_reward_code') || ("PRO-" + Math.random().toString(36).substr(2, 9).toUpperCase());
localStorage.setItem('final_reward_code', code);
document.getElementById('final-code').innerText = code;
}

function resetAll() { localStorage.clear(); location.reload(); }
buildUI();
</script>
