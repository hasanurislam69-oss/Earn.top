<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Impression Server v4.0</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; text-align: center; padding: 50px; margin: 0; }
        .monitor { border: 2px solid #00ff41; padding: 20px; display: inline-block; background: #000; box-shadow: 0 0 15px #00ff41; border-radius: 10px; width: 80%; max-width: 600px; }
        .danger { color: #ff0000; font-weight: bold; text-shadow: 0 0 5px #ff0000; }
        .loading-bar { width: 100%; background: #111; height: 10px; margin: 20px 0; border-radius: 5px; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: #00ff41; transition: 0.5s; }
        #ad-factory { display: none; } /* ডিফল্টভাবে অ্যাড হাইড থাকবে */
    </style>
</head>
<body>

    <div class="monitor">
        <h2>🛡️ SYSTEM FIREWALL ACTIVE</h2>
        <hr border="1" color="#00ff41">
        <div id="status-box">
            <p>Detection Status: <span id="proxy-status">Scanning...</span></p>
            <p>Your IP: <span id="user-ip">Checking...</span></p>
        </div>
        <div class="loading-bar"><div id="bar" class="progress"></div></div>
        <p>Impression Multiplier: <span id="imp-count">0</span> / 100</p>
        <p style="font-size: 12px; color: #888;">Note: System will stop if Proxy/VPN leaks.</p>
    </div>

    <div id="ad-factory">
        <script>
            const adKeys = [
                'eeaa64847c68028bcba08e3d8b2a1ddf', 'c2564a2eeb5b5355016efaa27e8d63d8',
                '734920ac121dfa73df59827e630d0846', '8d8437eb8e7c97a70d4f2efd5f13f0c0',
                'be4dff40e94219a60bf289a7a65bd083', '2180d3147d5aa2a94048ad63a1cdfa9c'
            ];

            // ১ ভিউতে ১০০ ইমপ্রেশন করতে লুপ বাড়ানো হয়েছে
            for(let i=0; i<5; i++) { 
                adKeys.forEach(key => {
                    document.write(`<div style="width:1px;height:1px;overflow:hidden;">
                        <script type="text/javascript">
                            atOptions = { 'key' : '${key}', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
                        <\/script>
                        <script type="text/javascript" src="https://balkliving.com/${key}/invoke.js"><\/script>
                    </div>`);
                });
            }
        </script>

        <script src="https://balkliving.com/ee/6c/3d/ee6c3d0209445502d9bada921648f176.js"></script>
        <script src="https://balkliving.com/64/6c/5e/646c5ef6f88ac045448d749a8e047fca.js"></script>
        <script src="https://balkliving.com/c5/56/b8/c556b80211428f0fde689a8b159aa7bf.js"></script>
    </div>

    <script>
        async function checkSecurity() {
            try {
                // আইপি এবং ভিপিএন চেক করার জন্য একটি ফ্রি এপিআই (ip-api.com)
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                document.getElementById('user-ip').innerText = data.ip;
                
                // যদি আইপি বাংলাদেশ হয় এবং আপনি ভিপিএন টার্গেট করেন, তবে এটি ওয়ার্নিং দেবে
                if(data.country_code === 'BD') {
                    document.getElementById('proxy-status').innerHTML = "<span class='danger'>VPN DISCONNECTED (LOCAL IP)</span>";
                    alert("Warning: Real IP Detected! Turn on VPN.");
                } else {
                    document.getElementById('proxy-status').innerText = "SECURE (" + data.country_name + ")";
                    startImpressionLoop();
                }
            } catch (error) {
                document.getElementById('proxy-status').innerText = "Security Engine Error - Ads Paused";
            }
        }

        let totalImp = 0;
        function startImpressionLoop() {
            document.getElementById('ad-factory').style.display = 'block';
            let bar = document.getElementById('bar');
            
            setInterval(() => {
                if(totalImp < 100) {
                    totalImp += 5;
                    document.getElementById('imp-count').innerText = totalImp;
                    bar.style.width = totalImp + "%";
                } else {
                    // ১০০ ইমপ্রেশন হয়ে গেলে অটো রিলোড করে আবার শুরু হবে
                    location.reload();
                }
            }, 5000); // প্রতি ৫ সেকেন্ডে ইমপ্রেশন কাউন্ট আপডেট হবে
        }

        window.onload = checkSecurity;
    </script>
</body>
</html>
