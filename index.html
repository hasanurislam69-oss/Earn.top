"https://www.effectivegatecpm.com/v0nxwfsecj?key=8c4ef9348a44009983a8f0b529b595fd_7",
"https://www.effectivegatecpm.com/rp1ik15t?key=f8c385df8f28dee235ecbeb994079ed4_8",

"https://www.effectivegatecpm.com/fx2cnr3n41?key=483351e0eff737bf7b151b56a09ff046_10",
"https://www.effectivegatecpm.com/pfwfq5e999?key=30f2fdcc970e4f1e0dfbf1fe136dc40b_11",
"https://www.effectivegatecpm.com/he1aimdkv0?key=580dc8cb21cdf7cc86ba7623bb0c0040_12",
"https://www.effectivegatecpm.com/h8q3ih2gu?key=3335bdf1429cf84ddcf658b2a09ade1f_13",
"https://www.effectivegatecpm.com/k5wn862a?key=e91eef53ee80c6aca41ed4b91e5882d0_14",
"https://www.effectivegatecpm.com/xzq9ch8g?key=e04ca928e03d740bcf6f948650f74aea_15",
"https://www.effectivegatecpm.com/hitvbts0an?key=9e53fdb5297ce39a064008e4ba7e82a1_16",
"https://www.effectivegatecpm.com/n4ed7c39rv?key=0a44a8ffdbbe4bdb185e466f8b416110_17",
"https://www.effectivegatecpm.com/j1s578pk?key=4546ff89eb8e6fbd51f2413087eb639d_18",
"https://www.effectivegatecpm.com/ub346upf5x?key=03e2e4060da55b395d4f45294500d25b_19",
"https://www.effectivegatecpm.com/hz2ddukd?key=2536f15fbdd4ecf61e3f99487bf61e73_20"
];

let currentTaskIndex = parseInt(localStorage.getItem('user_task_step')) || 0;
let isTabActive = true;
let currentAnswer = 0;

document.addEventListener("visibilitychange", () => { isTabActive = !document.hidden; });

function playBeep() {
try {
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const oscillator = audioCtx.createOscillator();
const gainNode = audioCtx.createGain();
oscillator.connect(gainNode);
gainNode.connect(audioCtx.destination);
oscillator.type = 'sine';
oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
oscillator.start();
oscillator.stop(audioCtx.currentTime + 0.5);
} catch(e){}
}

function buildUI() {
const grid = document.getElementById('task-grid');
grid.innerHTML = '';
TASK_LINKS.forEach((link, i) => {
const isDone = i < currentTaskIndex;
const card = document.createElement('div');
card.className = `card ${isDone ? 'completed' : (i === currentTaskIndex ? 'active' : 'locked')}`;
card.innerHTML = `
<img src="https://picsum.photos/400/200?random=${i}" style="width:100%">
<div class="card-content">
<div style="font-weight:600;margin-bottom:10px">Task #${i+1}</div>
<button class="btn" id="btn-${i}" ${i !== currentTaskIndex || isDone ? 'disabled' : ''} onclick="handleTask(${i})">
${isDone ? '✅ Done' : 'Start Task'}
</button>
<div id="warn-${i}" class="warning">⚠️ Stay on the ad page for a few seconds!</div>
<div id="math-${i}" class="math-box">
<span id="exp-${i}"></span> = <input type="number" id="ans-${i}">
<button onclick="verifyMath(${i})">Verify</button>
</div>
</div>`;
grid.appendChild(card);
});
if (currentTaskIndex >= TASK_LINKS.length) showFinal();
}

function handleTask(index) {
const btn = document.getElementById(`btn-${index}`);
const warn = document.getElementById(`warn-${index}`);

// --- Anti-Detection Logic Start ---
// উইন্ডো ওপেনার এবং রেফারার বন্ধ করা হয়েছে যাতে অ্যাড নেটওয়ার্ক সোর্স না জানে
const targetUrl = TASK_LINKS[index];
const taskWindow = window.open('about:blank', '_blank');
taskWindow.opener = null;
taskWindow.referrerPolicy = "no-referrer";
taskWindow.location.href = targetUrl;
// --- Anti-Detection Logic End ---

let timeNeeded = Math.floor(Math.random() * (25 - 19 + 1)) + 19;
let passed = 0;
btn.disabled = true;

const timer = setInterval(() => {
if (!isTabActive) {
passed++;
btn.innerText = `Analyzing... ${timeNeeded - passed}s`;
warn.style.display = 'none';
} else {
warn.style.display = 'block';
btn.innerText = "Paused! Go back to Ad";
}
if (passed >= timeNeeded) {
clearInterval(timer);
playBeep();
btn.style.display = 'none';
warn.style.display = 'none';
setTimeout(() => showMath(index), 1000);
}
}, 1000);
}

function showMath(index) {
const mathBox = document.getElementById(`math-${index}`);
const n1 = Math.floor(Math.random() * 15) + 1;
const n2 = Math.floor(Math.random() * 10) + 1;
currentAnswer = n1 + n2;
document.getElementById(`exp-${index}`).innerText = `${n1} + ${n2}`;
mathBox.style.display = 'block';
}

function verifyMath(index) {
if (parseInt(document.getElementById(`ans-${index}`).value) === currentAnswer) {
currentTaskIndex++;
localStorage.setItem('user_task_step', currentTaskIndex);
buildUI();
} else {
alert("Wrong! Try again.");
}
}

function showFinal() {
document.getElementById('final-section').style.display = 'block';
document.getElementById('task-grid').style.display = 'none';
let code = localStorage.getItem('final_reward_code') || ("PRO-" + Math.random().toString(36).substr(2, 9).toUpperCase());
localStorage.setItem('final_reward_code', code);
document.getElementById('final-code').innerText = code;
}

function resetAll() { localStorage.clear(); location.reload(); }
buildUI();
</script>
