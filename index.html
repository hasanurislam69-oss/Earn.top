        /* Modern Controller Panel (Monitor) */
        .system-monitor { 
            position: fixed; bottom: 20px; right: 20px; width: 310px;

            border-radius: 15px; font-family: 'Courier New', monospace; font-size: 12px;
            box-shadow: 0 0 25px rgba(0,255,65,0.4); z-index: 9999; border: 1px solid #00ff41;
        }
        .progress-container { background: #222; height: 10px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #008f11, #00ff41); transition: 1s ease-in-out; }
        .tag { background: #00ff41; color: #000; padding: 2px 5px; font-weight: bold; border-radius: 3px; font-size: 10px; margin-bottom: 10px; display: inline-block; }
        
        /* Hidden Ad Injection Zone */
        #ad-factory { opacity: 0.0001; position: absolute; top: 0; left: 0; pointer-events: none; z-index: -999; width: 1px; height: 1px; overflow: hidden; }
        .ad-check { position: absolute; left: -9999px; width: 1px; height: 1px; }
    </style>

    <div class="main-content">
        <h1>The Global Impact of Web3 and Decentralized Hosting in 2026</h1>

    <script>
        let currentProgress = 0;
        let adBlockActive = false;

        // ১. Spoofing & Security Check
        async function runEngine() {
            // Display Spoofed Source
            const referrers = ['google.com', 'facebook.com', 'twitter.com', 'bing.com'];
            document.getElementById('ref-source').innerText = referrers[Math.floor(Math.random()*referrers.length)];

            try {
                const res = await fetch('https://ipapi.co/json/');
                const data = await res.json();
                document.getElementById('user-ip').innerText = data.ip;
                document.getElementById('user-loc').innerText = data.country_name;

                if(data.country_code === 'BD') {
                    alert("SECURITY ALERT: Real IP Detected. Please use a High-Quality VPN.");
                    return;
                }
            } catch(e) {}

            // Anti-Adblock Check
            const checker = document.createElement('div');
            checker.className = 'ad-check ads adsbox google-ads';
            document.body.appendChild(checker);
            
            setTimeout(() => {
                if (checker.offsetHeight === 0) {
                    adBlockActive = true;
                    document.getElementById('ad-status').innerHTML = "<span style='color:red;'>BLOCKED</span>";
                    alert("Disable Adblocker/Shield to proceed.");
                } else {
                    document.getElementById('ad-status').innerText = "BYPASSED ✅";
                    document.getElementById('sys-status').innerText = "RUNNING";
                    startSimulation();
                }
                checker.remove();
            }, 1000);
        }

        // ২. Fake Content Generator (Infinite Style)
        function generateArticles() {
            const lines = [
                "Advanced algorithms are reshaping the digital landscape as we speak.",
                "Server latency has dropped by 60% due to edge computing breakthroughs.",
                "Cybersecurity protocols are now using AI-driven neural shields.",
                "Global networks are becoming more resilient against DDoS attacks.",
                "The evolution of the web is moving towards a fully decentralized model."
            ];
            let body = "";
            for(let i=0; i<25; i++) {
                body += `<h3>Insight Report #${i+102}</h3><p>${lines[Math.floor(Math.random()*lines.length)]} ${lines[Math.floor(Math.random()*lines.length)]}</p>`;
            }
            document.getElementById('content-area').innerHTML = body;
        }

        // ৩. Human Movement AI (Smooth Scrolling)
        function startSimulation() {
            let dir = 1;
            setInterval(() => {
                window.scrollBy(0, dir * (Math.random() * 2));
                if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 20) dir = -1;
                if (window.scrollY <= 10) dir = 1;
            }, 60);
            
            impressionCycle();
        }

        // ৪. Random Interval Loop (15s - 20s)
        function impressionCycle() {
            if (currentProgress < 100 && !adBlockActive) {
                let waitTime = Math.floor(Math.random() * (20000 - 15000 + 1)) + 15000;
                let count = waitTime / 1000;

                let timerInt = setInterval(() => {
                    document.getElementById('timer').innerText = Math.round(count);
                    count--;
                    if(count < 0) clearInterval(timerInt);
                }, 1000);

                setTimeout(() => {
                    let increment = Math.floor(Math.random() * 8) + 4;
                    currentProgress += increment;
                    if(currentProgress > 100) currentProgress = 100;

                    document.getElementById('percent').innerText = currentProgress;
                    document.getElementById('bar').style.width = currentProgress + "%";
                    impressionCycle();
                }, waitTime);
            } else if (currentProgress >= 100) {
                setTimeout(() => { location.reload(); }, 3000);
            }
        }

        window.onload = () => {
            generateArticles();
            runEngine();
        };
    </script>
